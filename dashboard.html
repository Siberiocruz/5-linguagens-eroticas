<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard de Leads - Instituto Sibério Cruz</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f0f2f5;
            color: #333;
        }

        .dashboard {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            background: linear-gradient(135deg, #2c3e50 0%, #1a2332 100%);
            color: white;
            padding: 30px;
            border-radius: 12px;
            margin-bottom: 30px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .header h1 {
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .header p {
            opacity: 0.9;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            border-left: 4px solid #d4af37;
        }

        .stat-card h3 {
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .stat-card .number {
            font-size: 2.5rem;
            font-weight: 700;
            color: #2c3e50;
        }

        .table-container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        .table-header {
            background: #f8f9fa;
            padding: 20px;
            border-bottom: 2px solid #e0e0e0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .table-header h2 {
            font-size: 1.3rem;
            color: #2c3e50;
        }

        .btn-refresh {
            background: #2c3e50;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-refresh:hover {
            background: #1a2332;
            transform: translateY(-2px);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: #f8f9fa;
            padding: 15px;
            text-align: left;
            font-weight: 600;
            color: #2c3e50;
            border-bottom: 2px solid #e0e0e0;
            font-size: 0.9rem;
            text-transform: uppercase;
        }

        td {
            padding: 15px;
            border-bottom: 1px solid #e0e0e0;
        }

        tr:hover {
            background: #f8f9fa;
        }

        .badge {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .badge-energetic {
            background: #d4edff;
            color: #0066cc;
        }

        .badge-sensorial {
            background: #ffe0f0;
            color: #cc0066;
        }

        .badge-Instintiva {
            background: #ffe0d4;
            color: #cc3300;
        }

        .badge-Proibida {
            background: #e8d4ff;
            color: #6600cc;
        }

        .badge-Êxtase {
            background: #d4ffe0;
            color: #009900;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #2c3e50;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }

        .empty-state-icon {
            font-size: 3rem;
            margin-bottom: 20px;
        }

        .footer {
            text-align: center;
            margin-top: 30px;
            padding: 20px;
            color: #666;
            font-size: 0.9rem;
        }

        @media (max-width: 768px) {
            .header {
                padding: 20px;
            }

            .header h1 {
                font-size: 1.5rem;
            }

            table {
                font-size: 0.9rem;
            }

            th, td {
                padding: 10px;
            }

            .table-header {
                flex-direction: column;
                gap: 15px;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <div class="header">
            <h1>📊 Dashboard de Leads</h1>
            <p>Instituto Sibério Cruz - Gerenciamento de Contatos</p>
        </div>

        <div class="stats">
            <div class="stat-card">
                <h3>Total de Leads</h3>
                <div class="number" id="total-leads">0</div>
            </div>
            <div class="stat-card">
                <h3>Presença</h3>
                <div class="number" id="count-energetic">0</div>
            </div>
            <div class="stat-card">
                <h3>Sensorial</h3>
                <div class="number" id="count-sensorial">0</div>
            </div>
            <div class="stat-card">
                <h3>Instintiva</h3>
                <div class="number" id="count-Instintiva">0</div>
            </div>
            <div class="stat-card">
                <h3>Proibido</h3>
                <div class="number" id="count-Proibida">0</div>
            </div>
            <div class="stat-card">
                <h3>Êxtase</h3>
                <div class="number" id="count-Êxtase">0</div>
            </div>
        </div>

        <div class="table-container">
            <div class="table-header">
                <h2>Leads Recentes</h2>
                <button class="btn-refresh" onclick="loadLeads()">🔄 Atualizar</button>
            </div>
            <div id="leads-content">
                <div class="loading">
                    <div class="spinner"></div>
                    <p>Carregando leads...</p>
                </div>
            </div>
        </div>

        <div class="footer">
            <p>© 2026 Instituto Sibério Cruz - Todos os direitos reservados</p>
        </div>
    </div>

    <script>
        // Carregar leads ao abrir a página
        document.addEventListener('DOMContentLoaded', loadLeads);

        async function loadLeads() {
            try {
                const response = await fetch('/api/leads');
                const data = await response.json();

                if (data.success) {
                    displayLeads(data.leads);
                    calculateStats(data.leads);
                } else {
                    showError('Erro ao carregar leads');
                }
            } catch (error) {
                console.error('Erro:', error);
                showError('Erro ao conectar com o servidor');
            }
        }

        function displayLeads(leads) {
            const container = document.getElementById('leads-content');

            if (leads.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📭</div>
                        <h3>Nenhum lead ainda</h3>
                        <p>Os leads aparecerão aqui quando pessoas fizerem o teste</p>
                    </div>
                `;
                return;
            }

            let html = `
                <table>
                    <thead>
                        <tr>
                            <th>Data/Hora</th>
                            <th>Nome</th>
                            <th>WhatsApp</th>
                            <th>Email</th>
                            <th>Perfil</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            leads.forEach(lead => {
                const badgeClass = `badge-${lead.quizResult.toLowerCase()}`;
                const profileName = getProfileName(lead.quizResult);
                
                html += `
                    <tr>
                        <td>${lead.timestamp}</td>
                        <td>${lead.fullName}</td>
                        <td><a href="https://wa.me/55${lead.whatsapp.replace(/\D/g, '')}" target="_blank">${lead.whatsapp}</a></td>
                        <td>${lead.email}</td>
                        <td><span class="badge ${badgeClass}">${profileName}</span></td>
                    </tr>
                `;
            });

            html += `
                    </tbody>
                </table>
            `;

            container.innerHTML = html;
        }

        function calculateStats(leads) {
            let counts = {
                total: leads.length,
                energetic: 0,
                sensorial: 0,
                Instintiva: 0,
                Proibida: 0,
                Êxtase: 0
            };

            leads.forEach(lead => {
                const profile = lead.quizResult.toLowerCase();
                if (profile === 'a') counts.energetic++;
                else if (profile === 'b') counts.sensorial++;
                else if (profile === 'c') counts.Instintiva++;
                else if (profile === 'd') counts.Proibida++;
                else if (profile === 'e') counts.Êxtase++;
            });

            document.getElementById('total-leads').textContent = counts.total;
            document.getElementById('count-energetic').textContent = counts.energetic;
            document.getElementById('count-sensorial').textContent = counts.sensorial;
            document.getElementById('count-Instintiva').textContent = counts.Instintiva;
            document.getElementById('count-Proibida').textContent = counts.Proibida;
            document.getElementById('count-Êxtase').textContent = counts.Êxtase;
        }

        function getProfileName(letter) {
            const profiles = {
                'A': '⚡ Presença',
                'B': '🌸 Sensorial',
                'C': '🔴 Instintiva',
                'D': '🟣 Proibido',
                'E': '🌈 Êxtase'
            };
            return profiles[letter] || letter;
        }

        function showError(message) {
            const container = document.getElementById('leads-content');
            container.innerHTML = `
                <div class="empty-state">
                    <div class="empty-state-icon">⚠️</div>
                    <h3>${message}</h3>
                    <p>Tente novamente mais tarde</p>
                </div>
            `;
        }
    </script>
</body>
</html>
